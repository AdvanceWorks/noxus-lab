line-length = 100
target-version = "py310"
extend-exclude = [".venv", "runs", "outputs", "scratch", "build", "dist", "noxuslab/templates"]

[lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "SIM", # flake8-simplify
  "RET", # flake8-return
  "PTH", # flake8-use-pathlib
  "S",   # bandit (security)
  "PERF",
]
ignore = [
  "E501",  # line length handled by formatter
  "S101",  # asserts are fine in tests
]

[lint.per-file-ignores]
"tests/*" = ["S101", "S102", "S105", "S106"]
"examples/*" = ["S101"]
"noxuslab/cli.py" = ["S102"]  # exec needed for `noxuslab push`

[format]
quote-style = "double"
indent-style = "space"
