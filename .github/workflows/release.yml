name: release

# Build artifacts and create a GitHub release on every vX.Y.Z tag.
# PyPI publishing is intentionally NOT enabled — the project is not
# registered on PyPI yet. To enable it later: configure trusted
# publishing at https://pypi.org/manage/account/publishing/ and add a
# pypa/gh-action-pypi-publish step to this workflow.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: gh release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
