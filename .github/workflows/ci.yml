name: ci

on: [push, pull_request]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: install
        run: pip install -e ".[dev]"
      - name: lint
        run: |
          ruff check .
          ruff format --check .
      - name: test
        run: pytest
