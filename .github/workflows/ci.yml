name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sh bin/setup
      - run: sh bin/lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: setup
        shell: bash
        run: sh bin/setup
      - name: test
        shell: bash
        run: sh bin/test
      - name: compileall examples
        shell: bash
        run: |
          if [ -x .venv/bin/python ]; then
            .venv/bin/python -m compileall -q examples
          else
            .venv/Scripts/python.exe -m compileall -q examples
          fi

  smoke:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sh bin/setup
      - name: smoke (live backend)
        env:
          NOXUS_API_KEY: ${{ secrets.NOXUS_API_KEY }}
          NOXUS_BACKEND_URL: ${{ secrets.NOXUS_BACKEND_URL }}
        if: env.NOXUS_API_KEY != ''
        run: |
          .venv/bin/python examples/01_hello.py
