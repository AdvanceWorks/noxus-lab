name: ci

on: [push, pull_request]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: setup (locked, posix)
        if: runner.os != 'Windows'
        env:
          LOCKED: "1"
        run: sh bin/setup
      - name: setup (locked, windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          LOCKED: "1"
        run: sh bin/setup
      - name: lint
        if: runner.os != 'Windows'
        run: sh bin/lint
      - name: lint (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sh bin/lint
      - name: test
        if: runner.os != 'Windows'
        run: sh bin/test
      - name: test (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sh bin/test
