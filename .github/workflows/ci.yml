name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Trimmed matrix: 3 jobs. Min/max Python on Linux; Windows for OS coverage.
      # macOS commented out — runners cost 10× and no macOS-specific bugs seen.
      # 3.11 skipped — 3.10 + 3.12 bound the range; add back if a bug appears.
      matrix:
        include:
          - { os: ubuntu-latest,  python: "3.10" }
          - { os: ubuntu-latest,  python: "3.12" }
          # - { os: macos-latest,   python: "3.12" }  # 10× cost, disabled
          - { os: windows-latest, python: "3.12" }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: install
        run: pip install -e ".[dev]"
      - name: lint
        run: |
          ruff check .
          ruff format --check .
      - name: test
        run: pytest
