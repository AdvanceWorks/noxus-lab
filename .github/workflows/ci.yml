name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Trimmed matrix: cover every supported OS + the min/max Python.
      # 9 jobs → 4. Mid-version (3.11) skipped because 3.10 + 3.12 bound
      # the syntax/semantics range; add it back if a 3.11-only bug appears.
      matrix:
        include:
          - { os: ubuntu-latest,  python: "3.10" }
          - { os: ubuntu-latest,  python: "3.12" }
          - { os: macos-latest,   python: "3.12" }
          - { os: windows-latest, python: "3.12" }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: install
        run: pip install -e ".[dev]"
      - name: lint
        run: |
          ruff check .
          ruff format --check .
      - name: test
        run: pytest
