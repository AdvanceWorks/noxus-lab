name: Bug
description: Something doesn't work as documented
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      placeholder: Describe the problem and the steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Python, noxus-sdk version, noxuslab version"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
